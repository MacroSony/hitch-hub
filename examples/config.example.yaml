data_dir: .remote-agent-hub
default_cwd: ..
agent_turn_timeout_ms: 60000

users:
  local:
    telegram_ids: []
    allowed_roots:
      - ..

channels:
  fake:
    enabled: true
  telegram:
    enabled: true
    bot_token_env: TELEGRAM_BOT_TOKEN
    allowed_chat_ids: []

agents:
  pi:
    command: pi
    default_args:
      - --mode
      - rpc
    default_policy: ask
